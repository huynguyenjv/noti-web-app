<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FCM Notification Tester</title>
  <style>
    :root {
      --bg-canvas: #0b0f19;
      --bg-panel: #121826;
      --bg-panel-raised: #171f30;
      --border: #232c42;
      --border-soft: #1b2337;
      --text-primary: #e7ecf5;
      --text-muted: #8993a8;
      --text-faint: #5c6580;
      --accent: #4f8cff;
      --accent-soft: rgba(79, 140, 255, 0.12);
      --accent-2: #34d399;
      --accent-2-soft: rgba(52, 211, 153, 0.12);
      --danger: #f2617a;
      --radius: 10px;
      --mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      --sans: "Inter", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--bg-canvas);
      background-image:
        radial-gradient(circle at 15% 0%, rgba(79, 140, 255, 0.08), transparent 40%),
        radial-gradient(circle at 85% 10%, rgba(52, 211, 153, 0.06), transparent 35%);
      color: var(--text-primary);
      max-width: 760px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
      line-height: 1.5;
    }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border-soft);
    }

    .page-head h1 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 0.35rem;
    }

    .page-head p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.03em;
      color: var(--text-muted);
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .status-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-faint);
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .status-pill.is-live .dot {
      background: var(--accent-2);
      box-shadow: 0 0 0 3px var(--accent-2-soft);
    }

    section {
      position: relative;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.4rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    .step-head {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .step-num {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 5px;
      padding: 0.15rem 0.45rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .step-head h2 {
      font-size: 0.98rem;
      font-weight: 600;
      margin: 0;
    }

    .step-head span.hint {
      margin-left: auto;
      font-size: 0.76rem;
      color: var(--text-faint);
      font-family: var(--mono);
    }

    label {
      display: block;
      margin: 0.9rem 0 0.35rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    label:first-of-type { margin-top: 0; }

    input, textarea, select {
      width: 100%;
      padding: 0.55rem 0.7rem;
      background: var(--bg-canvas);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-primary);
      font-family: var(--sans);
      font-size: 0.9rem;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    textarea { font-family: var(--mono); font-size: 0.82rem; resize: vertical; }

    input::placeholder, textarea::placeholder { color: var(--text-faint); }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--text-muted) 50%),
                         linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
      background-position: calc(100% - 18px) center, calc(100% - 13px) center;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    button {
      margin-top: 1rem;
      padding: 0.6rem 1.1rem;
      border: 1px solid transparent;
      border-radius: 7px;
      font-family: var(--sans);
      font-size: 0.86rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.15s ease, background 0.15s ease;
    }

    button:active { transform: translateY(1px); }

    .btn-primary {
      background: var(--accent);
      color: #06101f;
    }
    .btn-primary:hover { filter: brightness(1.08); }

    .btn-secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--text-primary);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .btn-row { display: flex; gap: 0.6rem; flex-wrap: wrap; }

    #token {
      font-family: var(--mono);
      font-size: 0.8rem;
      word-break: break-all;
      background: var(--bg-canvas);
      border: 1px dashed var(--border);
      color: var(--text-muted);
      padding: 0.65rem 0.75rem;
      border-radius: 7px;
      min-height: 1.2rem;
    }

    #token.has-token {
      color: var(--accent-2);
      border-style: solid;
      border-color: var(--border);
    }

    #log {
      background: #070a12;
      color: var(--accent-2);
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.85rem;
      border-radius: 7px;
      border: 1px solid var(--border);
      height: 200px;
      overflow: auto;
      white-space: pre-wrap;
    }

    #log:empty::before {
      content: "// chưa có hoạt động nào — log sẽ hiện tại đây";
      color: var(--text-faint);
    }

    @media (max-width: 480px) {
      .page-head { flex-direction: column; }
      .step-head span.hint { display: none; }
    }
  </style>
</head>
<body>

  <div class="page-head">
    <div>
      <h1>FCM Notification Tester</h1>
      <p>Công cụ kiểm thử gửi/nhận push notification qua Firebase Cloud Messaging</p>
    </div>
    <span class="status-pill" id="statusPill"><span class="dot"></span><span id="statusText">chưa kết nối</span></span>
  </div>

  <section>
    <div class="step-head">
      <span class="step-num">01</span>
      <h2>Nhận (client)</h2>
      <span class="hint">device token</span>
    </div>
    <label>User ID</label>
    <input id="userId" placeholder="vd: demo-user" value="demo-user" />
    <button id="enableBtn" class="btn-primary">Bật nhận thông báo</button>
    <label>FCM Token</label>
    <div id="token">chưa có token</div>
    <div class="btn-row">
      <button id="copyBtn" class="btn-secondary">Copy token</button>
      <button id="registerBtn" class="btn-secondary">Đăng ký với notification service</button>
    </div>
  </section>

  <section>
    <div class="step-head">
      <span class="step-num">02</span>
      <h2>Gửi (server)</h2>
      <span class="hint">payload</span>
    </div>

    <label>Target type</label>
    <select id="targetType">
      <option value="token">token</option>
      <option value="topic">topic</option>
    </select>

    <label>Target value (token hoặc topic)</label>
    <input id="targetValue" placeholder="dán token hoặc nhập tên topic" />

    <label>Tiêu đề</label>
    <input id="title" placeholder="Tiêu đề" />

    <label>Nội dung</label>
    <input id="body" placeholder="Nội dung" />

    <label>Data (JSON, tùy chọn)</label>
    <textarea id="data" rows="3" placeholder='{"key":"value"}'></textarea>

    <div class="btn-row">
      <button id="sendBtn" class="btn-primary">Gửi notification</button>
    </div>
  </section>

  <section>
    <div class="step-head">
      <span class="step-num">03</span>
      <h2>Log</h2>
      <span class="hint">realtime</span>
    </div>
    <div id="log"></div>
  </section>

  <script type="module" src="/app.js"></script>
</body>
</html>
